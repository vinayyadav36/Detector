version: "3.9"

services:
  web:
    build: .
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql://detector:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD environment variable is required}@db:5432/detector
      REDIS_URL: redis://redis:6379/0
      FLASK_ENV: production
      SESSION_COOKIE_SECURE: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: gunicorn -c gunicorn.conf.py run:app
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5

  worker:
    build: .
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql://detector:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD environment variable is required}@db:5432/detector
      REDIS_URL: redis://redis:6379/0
      FLASK_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app.celery worker --loglevel=info

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: detector
      POSTGRES_USER: detector
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD environment variable is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U detector -d detector"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
