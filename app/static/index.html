<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0b1220">
    <!-- CSRF token will be injected here by app.js from an endpoint, or we could handle it via JS strictly. For now, empty meta. -->
    <meta name="csrf-token" content="">
    <title>Detector</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/static/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="stylesheet" href="/static/css/app.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="/">Detector</a>
        <nav class="topnav">
          <a href="/disclaimer">Disclaimer</a>
          <a href="/privacy">Privacy</a>
          <a href="/terms">Terms</a>
          <a href="/admin">Admin</a>
          <button id="theme-toggle" class="ghost-button" type="button" aria-label="Toggle dark mode">Theme</button>
        </nav>
      </header>
      <main class="content">
        <section class="flash-stack" id="flash-stack" style="display: none;"></section>
        <div id="app-view">
          <!-- Views injected here by app.js -->
        </div>
      </main>
      <footer class="footer">
        <p>Production-ready suspicious website detector with installable PWA support.</p>
        <div>
          <a href="/disclaimer">Disclaimer</a>
          <a href="/privacy">Privacy</a>
          <a href="/terms">Terms</a>
        </div>
      </footer>
    </div>

    <!-- Template for Index -->
    <template id="view-index">
      <div class="hero">
        <h1>Analyze suspicious websites</h1>
        <p>Detect phishing, scams, and malware domains instantly.</p>
        <form id="analyze-form" class="url-form">
          <input type="url" name="url" placeholder="https://..." required>
          <button type="submit" class="button button-primary">Analyze URL</button>
        </form>
        <div id="analysis-error" class="flash flash-error hidden"></div>
        <button id="install-button" class="button hidden">Install App</button>
        <button id="notify-button" class="button hidden">Enable Alerts</button>
      </div>
      <div class="split-layout">
        <section class="card">
          <h2>Latest analysis</h2>
          <div id="result-content" class="result-box">
            <p class="muted">Enter a URL above to begin.</p>
          </div>
        </section>
        <aside class="sidebar">
          <h3>Recent</h3>
          <div id="recent-results" class="recent-list">
            <!-- Populated by JS -->
          </div>
        </aside>
      </div>
    </template>

    <!-- Template for Result -->
    <template id="view-result">
      <div class="hero">
        <h1>Analysis result</h1>
        <div id="result-detail-content">Loading...</div>
        <form id="feedback-form" action="" method="post" style="margin-top: 2rem;">
          <button type="submit" class="button button-secondary">Report incorrect label</button>
        </form>
      </div>
    </template>

    <!-- Template for Disclaimer, Privacy, Terms, Offline -->
    <template id="view-simple">
      <div class="hero">
        <h1 id="simple-title"></h1>
        <div id="simple-content" class="card"></div>
      </div>
    </template>


    <!-- Template for Admin Login -->
    <template id="view-admin-login">
      <div class="hero">
        <h1>Admin login</h1>
        <div class="card" style="max-width: 400px; margin: 2rem auto;">
          <form id="admin-login-form">
            <div class="form-group">
              <label for="username">Username</label>
              <input type="text" id="username" name="username" class="form-control" required>
            </div>
            <div class="form-group" style="margin-top: 1rem;">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="button button-primary" style="margin-top: 1.5rem; width: 100%;">Login</button>
            <div id="login-error" class="flash flash-error hidden" style="margin-top: 1rem;"></div>
          </form>
        </div>
      </div>
    </template>

    <!-- Template for Admin Dashboard -->
    <template id="view-admin-dashboard">
      <div class="hero">
        <h1>Admin Dashboard</h1>
        <div style="text-align: right; margin-bottom: 1rem;">
          <button id="admin-logout-btn" class="button button-secondary">Logout</button>
        </div>

        <div class="split-layout">
          <div class="card">
            <h2>System Health</h2>
            <div id="admin-health-content">Loading...</div>
          </div>
          <div class="card">
            <h2>Statistics</h2>
            <div id="admin-stats-content">Loading...</div>
          </div>
        </div>

        <div class="card" style="margin-top: 2rem;">
          <h2>Batch Analysis</h2>
          <form id="admin-batch-form" enctype="multipart/form-data">
            <input type="file" name="file" accept=".csv" required>
            <button type="submit" class="button button-primary">Upload & Analyze CSV</button>
            <div id="batch-error" class="flash flash-error hidden" style="margin-top: 1rem;"></div>
          </form>
        </div>

        <div class="card" style="margin-top: 2rem;">
          <h2>Blacklist Management</h2>
          <form id="admin-blacklist-form" style="margin-bottom: 1rem;">
            <input type="text" name="domain" placeholder="example.com" required>
            <input type="text" name="reason" placeholder="Reason (optional)">
            <button type="submit" class="button button-primary">Add to Blacklist</button>
          </form>
          <table class="table" style="width: 100%;">
            <thead>
              <tr>
                <th>Domain</th>
                <th>Reason</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="admin-blacklist-content">
              <tr><td colspan="3">Loading...</td></tr>
            </tbody>
          </table>
        </div>

        <div class="card" style="margin-top: 2rem;">
          <h2>Recent Reports</h2>
          <div style="margin-bottom: 1rem;">
            <a href="/api/admin/export.csv" class="button button-secondary" target="_blank" data-external>Export CSV</a>
            <a href="/api/admin/export.pdf" class="button button-secondary" target="_blank" data-external>Export PDF</a>
          </div>
          <table class="table" style="width: 100%;">
            <thead>
              <tr>
                <th>Date</th>
                <th>Domain</th>
                <th>Score</th>
                <th>Label</th>
              </tr>
            </thead>
            <tbody id="admin-reports-content">
              <tr><td colspan="4">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </template>


    <script src="/static/js/app.js" defer></script>
  </body>
</html>
