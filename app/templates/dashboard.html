{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="mb-0">Admin Dashboard</h1>
  <a class="btn btn-outline-light" href="{{ url_for('main.export_csv') }}">Export CSV</a>
</div>

<div class="card bg-dark border-secondary mb-3">
  <div class="card-body">
    <canvas id="riskChart" height="100"></canvas>
  </div>
</div>

<div class="card bg-dark border-secondary">
  <div class="table-responsive">
    <table class="table table-dark table-striped mb-0">
      <thead>
        <tr><th>Time</th><th>URL</th><th>Score</th><th>Verdict</th></tr>
      </thead>
      <tbody>
        {% for row in analyses %}
        <tr>
          <td>{{ row.created_at.strftime('%Y-%m-%d %H:%M:%S') }}</td>
          <td class="small">{{ row.url }}</td>
          <td>{{ row.risk_score }}</td>
          <td>{{ row.verdict }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
new Chart(document.getElementById('riskChart'), {
  type: 'line',
  data: {
    labels: {{ chart_labels | tojson }},
    datasets: [{
      label: 'Risk score trend',
      data: {{ chart_scores | tojson }},
      borderColor: '#dc3545'
    }]
  },
  options: { responsive: true }
});
</script>
{% endblock %}
